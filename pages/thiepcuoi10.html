<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Thiệp Mời Cưới – Minh Hoàng & Mai Hương</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Great+Vibes&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary:      #7D1F2A;
      --primary-dark: #5a1520;
      --gold:         #C5A55A;
      --bg:           #FFFAF7;
      --text:         #2C1810;
      --white:        #ffffff;
      --max-w:        420px;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: #f0e8e0;
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    .page-wrap {
      max-width: var(--max-w);
      margin: 0 auto;
      background: var(--bg);
      overflow: hidden;
      position: relative;
      min-height: 100vh;
    }

    /* ── KEYFRAMES ── */
    @keyframes fadeIn       { from{opacity:0} to{opacity:1} }
    @keyframes fadeInUp     { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeInDown   { from{opacity:0;transform:translateY(-30px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeInLeft   { from{opacity:0;transform:translateX(-40px)} to{opacity:1;transform:translateX(0)} }
    @keyframes fadeInRight  { from{opacity:0;transform:translateX(40px)} to{opacity:1;transform:translateX(0)} }
    @keyframes zoomIn       { from{opacity:0;transform:scale(0.7)} to{opacity:1;transform:scale(1)} }
    @keyframes flash        { 0%,100%{opacity:1} 50%{opacity:.3} }
    @keyframes pulse        { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
    @keyframes slideInLeft  { from{transform:translateX(100%)} to{transform:translateX(0)} }
    @keyframes slideInRight { from{transform:translateX(-100%)} to{transform:translateX(0)} }
    @keyframes petalFall {
      0%   { transform:translateY(-20px) rotate(0deg); opacity:0; }
      10%  { opacity:.8; }
      90%  { opacity:.6; }
      100% { transform:translateY(110vh) rotate(720deg); opacity:0; }
    }
    @keyframes musicPulse {
      0%,100% { box-shadow:0 0 0 0 rgba(125,31,42,.4); }
      50%     { box-shadow:0 0 0 12px rgba(125,31,42,0); }
    }
    @keyframes scaleIn { from{transform:scale(1.15)} to{transform:scale(1)} }
    @keyframes toastIn  { from{opacity:0;transform:translate(-50%,-20px)} to{opacity:1;transform:translate(-50%,0)} }
    @keyframes toastOut { from{opacity:1;transform:translate(-50%,0)} to{opacity:0;transform:translate(-50%,-20px)} }

    /* ── SCROLL REVEAL ── */
    .reveal       { opacity:0; transform:translateY(28px); transition:opacity .7s ease, transform .7s ease; }
    .reveal-left  { opacity:0; transform:translateX(-40px); transition:opacity .7s ease, transform .7s ease; }
    .reveal-right { opacity:0; transform:translateX(40px); transition:opacity .7s ease, transform .7s ease; }
    .reveal-zoom  { opacity:0; transform:scale(.85); transition:opacity .7s ease, transform .7s ease; }
    .reveal.visible,.reveal-left.visible,.reveal-right.visible,.reveal-zoom.visible { opacity:1; transform:none; }
    .d1{transition-delay:.1s}.d2{transition-delay:.2s}.d3{transition-delay:.3s}
    .d4{transition-delay:.4s}.d5{transition-delay:.5s}.d6{transition-delay:.6s}

    /* ── PETALS ── */
    .petal {
      position:fixed; top:-20px; pointer-events:none; z-index:9999;
      font-size:14px; opacity:0;
      animation:petalFall linear infinite;
      user-select:none;
    }

    /* ── MUSIC ── */
    #music-toggle {
      position:fixed; left:14px; bottom:14px; z-index:99999;
      width:56px; height:56px; border-radius:50%;
      background:rgba(255,255,255,.9); backdrop-filter:blur(6px);
      display:grid; place-items:center; cursor:pointer;
      box-shadow:0 4px 16px rgba(0,0,0,.15);
      border:2px solid var(--gold);
      transition:transform .2s ease;
    }
    #music-toggle:hover { transform:scale(1.05); }
    #music-toggle.playing { animation:musicPulse 2s infinite; }
    #music-toggle img { width:44px; height:44px; object-fit:contain; pointer-events:none; }

    /* ══════════════════════════════════════
       SECTION 1 – HERO (giống w-1toiquem)
    ══════════════════════════════════════ */
    #sec-hero {
      position:relative; width:100%;
      height:800px; overflow:hidden;
      background:#fff;
    }
    /* ảnh nền chính */
    #hero-bg {
      position:absolute; top:165px; left:0;
      width:100%; height:470px;
      background:center center/cover no-repeat;
      animation:fadeIn 5s ease forwards;
    }
    /* overlay phải – slideInLeft 15s */
    #hero-overlay-r {
      position:absolute; top:0; left:100%;
      width:100%; height:100%;
      background:center center/cover no-repeat;
      animation:slideInLeft 15s ease forwards;
      pointer-events:none; z-index:2;
    }
    /* overlay trái – slideInRight 8s */
    #hero-overlay-l {
      position:absolute; top:0; right:100%;
      width:100%; height:100%;
      background:center center/cover no-repeat;
      animation:slideInRight 8s ease forwards;
      pointer-events:none; z-index:2;
    }
    /* "Thiệp Mời Cưới" – top 20px, fadeInDown 5s */
    .hero-top-text {
      position:absolute; top:20px; left:23px; right:0;
      font-family:'Cormorant Garamond',serif; font-size:25px;
      letter-spacing:3px; line-height:1;
      color:var(--text); z-index:3;
      animation:fadeInDown 5s ease forwards;
    }
    /* "Minh Hoàng & Mai Hương" – top 65px, zoomIn 8s */
    .hero-couple-text {
      position:absolute; top:65px; left:0; right:0; text-align:center;
      font-family:'Cormorant Garamond',serif; font-size:20px; letter-spacing:4px;
      line-height:3; color:var(--text); z-index:3;
      animation:zoomIn 8s ease forwards;
    }
    /* date – top 679px, fadeInUp 3s */
    .hero-date {
      position:absolute; top:679px; left:0; right:0; text-align:center;
      font-family:'Cormorant Garamond',serif; font-size:25px; letter-spacing:7px;
      color:var(--text); z-index:3;
      animation:fadeInUp 3s ease forwards;
    }
    /* flower icon – top 738px, center, flash infinite 4s */
    .hero-flower {
      position:absolute; top:738px; left:50%; transform:translateX(-50%) rotate(90deg);
      width:61px; height:61px; z-index:3;
      animation:flash 4s infinite;
    }
    .hero-flower img { width:100%; height:100%; object-fit:contain; }

    /* ══════════════════════════════════════
       SECTION 2 – FAMILY (giống w-28wd2jg4)
    ══════════════════════════════════════ */
    #sec-family {
      position:relative; background:#fff;
      padding-bottom:30px; overflow:hidden;
    }
    /* ảnh gia đình – top phần trên, slideInLeft 3s */
    .family-photo-wrap {
      position:relative; height:270px; overflow:hidden;
      animation:slideInLeft 3s ease forwards;
    }
    #family-bg {
      width:100%; height:100%;
      background:center -30px/cover no-repeat;
    }
    .family-photo-fade {
      position:absolute; bottom:0; left:0; right:0; height:100px;
      background:linear-gradient(to bottom, #fff 0%, rgba(232,249,255,0) 100%);
    }

    /* dải đỏ dọc bên phải */
    .family-side-bar {
      position:absolute; top:0; right:0;
      width:72px; height:225px;
      background:var(--primary);
    }
    /* icon vị trí trong dải đỏ */
    .family-side-icon {
      position:absolute; top:162px; right:16px;
      width:52px; height:52px;
      filter:brightness(200%);
      animation:fadeInUp 2s ease forwards;
    }
    .family-side-icon img { width:100%; height:100%; object-fit:contain; }
    /* dot trắng + music icon nhỏ */
    .family-side-dot {
      position:absolute; top:9.5px; right:85px;
      width:15px; height:15px; border-radius:50%;
      background:#fff;
    }
    .family-side-note {
      position:absolute; top:7.5px; right:88px;
      width:20px; height:20px;
    }
    .family-side-note img { width:100%; height:100%; }

    /* line trái (dọc) */
    .family-vline-left {
      position:absolute; top:14.5px; left:17.5px;
      width:1px; height:47px;
      background:rgba(83,96,119,1);
    }
    /* "Thiệp / Mời / Cưới" – fadeInRight 2s */
    .family-title-text {
      position:absolute; top:46px; left:39px;
      font-family:'Cormorant Garamond',serif; font-size:26px; letter-spacing:2px;
      line-height:1; color:var(--text);
      animation:fadeInRight 2s ease forwards;
    }
    /* line dài giữa */
    .family-vline-mid {
      position:absolute; top:243px; left:0;
      width:1px; height:248px;
      background:rgba(83,96,119,1);
      left: calc(50% - 84px);
    }

    /* NHÀ TRAI / NHÀ GÁI text block */
    .family-info-block {
      padding: 10px 20px 0 20px;
    }
    .family-label-nt {
      font-family:'Cormorant Garamond',serif; font-size:16px; font-style:italic;
      color:var(--text); margin-bottom:2px;
      animation:fadeInRight 3s ease forwards;
    }
    .family-name-nt {
      font-family:'Cormorant Garamond',serif; font-size:16px;
      color:var(--text); white-space:pre-line; line-height:1.5;
      animation:fadeInRight 3s ease forwards;
    }
    .family-addr-nt {
      font-size:13px; color:rgba(44,24,16,.55);
      animation:fadeInRight 3s ease forwards;
    }

    /* "Trân Trọng Báo Tin..." – fadeInUp 3s */
    .announce-sub {
      font-family:'Cormorant Garamond',serif; font-size:20px; line-height:1.5;
      text-align:center; color:var(--text); padding:10px 60px 0;
      animation:fadeInUp 3s ease forwards;
    }
    /* Tên chú rể/cô dâu – zoomIn 4s */
    .groom-name-big, .bride-name-big {
      font-family:'Great Vibes',cursive; font-size:40px;
      text-align:center; color:var(--text); display:block;
      text-shadow:0 4px 4px rgba(255,255,255,1);
      animation:zoomIn 4s ease forwards;
    }
    /* "and" – zoomIn 4s */
    .and-text {
      font-family:'Great Vibes',cursive; font-size:35px;
      text-align:center; color:var(--text); display:block;
      text-shadow:0 4px 4px rgba(255,255,255,1);
      animation:zoomIn 4s ease forwards;
    }
    /* THIỆP MỜI THAM DỰ – fadeInRight 3s */
    .invite-label {
      font-family:'Cormorant Garamond',serif; font-size:25px;
      text-align:center; color:var(--text); text-transform:uppercase;
      padding:8px 0;
      animation:fadeInRight 3s ease forwards;
    }
    /* Trân Trọng Kính Mời + guest */
    .invite-guest-wrap {
      text-align:center; padding:10px 20px 20px;
      animation:fadeInUp 3s ease forwards;
    }
    .invite-dear-label {
      font-family:'Cormorant Garamond',serif; font-size:22px; line-height:1.5;
      text-align:center; color:var(--text);
    }
    .invite-line { border:none; border-top:1px dotted rgba(0,0,0,.25); width:301px; margin:6px auto; }
    .invite-guest-name {
      font-family:'Great Vibes',cursive; font-size:25px;
      color:var(--text); display:block; line-height:1.5;
      animation:fadeInUp 3s ease forwards;
    }

    /* family cols */
    .family-row { display:flex; gap:0; margin:16px 0 0; }
    .family-col { flex:1; padding:0 12px; border-right:1px solid rgba(83,96,119,.2); }
    .family-col:last-child { border-right:none; }
    .family-col-label {
      font-family:'Cormorant Garamond',serif; font-size:16px; font-style:italic;
      color:var(--text); letter-spacing:1px; margin-bottom:2px;
      animation:fadeInRight 3s ease forwards;
    }
    .family-col:last-child .family-col-label { animation:fadeInRight 3s ease forwards; }
    .family-col-parents {
      font-family:'Cormorant Garamond',serif; font-size:16px;
      line-height:1.5; white-space:pre-line; color:var(--text);
    }
    .family-col-address { font-size:13px; color:rgba(44,24,16,.55); margin-top:2px; }

    /* ══════════════════════════════════════
       SECTION 3 – LỄ THÀNH HÔN (w-u2qdu5go)
    ══════════════════════════════════════ */
    #sec-ceremony {
      background:#fff; padding:26px 20px;
      border-top:1px solid rgba(125,31,42,.08);
      overflow:hidden;
    }
    .event-title-left {
      font-family:'Cormorant Garamond',serif; font-size:23px;
      color:var(--text); margin-bottom:8px;
      animation:fadeInLeft 3s ease forwards;
    }
    .event-line-right {
      border:none; border-top:1px solid rgba(83,96,119,1);
      width:200px; margin:6px 0 6px auto;
      animation:fadeInRight 3s ease forwards;
    }
    .event-detail-right {
      font-size:15px; letter-spacing:1px;
      text-align:right; color:var(--text);
      font-family:'Barlow',sans-serif;
      animation:fadeInRight 3s ease forwards;
    }
    .event-detail-italic-right {
      font-size:13px; color:rgba(44,24,16,.5); font-style:italic;
      text-align:right; letter-spacing:1px;
      animation:fadeInRight 3s ease forwards;
    }

    /* ══════════════════════════════════════
       SECTION 4 – TIỆC CƯỚI (w-dh1x2yay)
    ══════════════════════════════════════ */
    #sec-reception {
      background:#fff; padding:26px 20px;
      border-top:1px solid rgba(125,31,42,.08);
      overflow:hidden;
    }
    .event-title-right {
      font-family:'Cormorant Garamond',serif; font-size:23px;
      color:var(--text); text-align:right; margin-bottom:8px;
      animation:fadeInRight 3s ease forwards;
    }
    .event-line-left {
      border:none; border-top:1px solid rgba(83,96,119,1);
      width:200px; margin:6px auto 6px 0;
      animation:fadeInLeft 3s ease forwards;
    }
    .event-detail-left {
      font-size:15px; letter-spacing:1px;
      text-align:left; color:var(--text);
      font-family:'Barlow',sans-serif;
      animation:fadeInLeft 3s ease forwards;
    }
    .event-detail-italic-left {
      font-size:13px; color:rgba(44,24,16,.5); font-style:italic;
      text-align:left; letter-spacing:1px;
      animation:fadeInLeft 3s ease forwards;
    }

    /* ══════════════════════════════════════
       SECTION 5 – MAP (w-frfn2a1z + w-gxpbejzi)
    ══════════════════════════════════════ */
    #sec-map-ornament {
      background:#fff; padding:16px 31px;
      overflow:hidden;
    }
    #sec-map-ornament img {
      width:100%; height:316px; object-fit:cover;
      display:block; border-radius:0;
      animation:fadeIn 2s ease forwards;
    }
    .map-pin-ornament {
      position:absolute; right:14px; top:50%;
      transform:translateY(-50%);
      width:39px; height:39px;
      animation:pulse 2s infinite;
    }
    .map-pin-ornament img { width:100%; height:100%; }

    #sec-venue { background:#fff; padding:0 0 20px; overflow:hidden; }
    .venue-header {
      background:var(--primary); padding:5px 14px 5px 58px;
      display:flex; align-items:center; position:relative;
      height:48px;
    }
    .venue-header-icon {
      position:absolute; left:8px; top:3px;
      width:42px; height:42px; filter:brightness(200%);
      animation:fadeInLeft 3s ease forwards;
    }
    .venue-header-icon img { width:100%; height:100%; object-fit:contain; }
    .venue-header-text {
      font-family:'Cormorant Garamond',serif; font-size:26px;
      letter-spacing:1px; color:#fff; line-height:1.5;
      animation:zoomIn 3s ease forwards;
    }
    .venue-name {
      font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:bold;
      color:var(--text); padding:14px 0 4px; text-align:center;
      text-transform:uppercase;
      animation:fadeInUp 2s ease forwards;
    }
    .venue-address {
      font-size:14px; letter-spacing:1px; text-align:center;
      padding:0 26px 12px; color:var(--text);
      animation:fadeInUp 2s ease forwards;
    }
    .venue-btn {
      display:block; width:140px; margin:0 auto 14px;
      background:var(--primary); color:#fff;
      font-size:15px; text-align:center; padding:8px 0;
      border-radius:42px; box-shadow:0 4px 4px rgba(0,0,0,.25);
      text-decoration:none; transition:transform .2s;
      animation:fadeInUp 2s ease forwards;
    }
    .venue-btn:hover { transform:translateY(-2px); }
    .venue-map-wrap {
      margin:0 35px; border-radius:0; overflow:hidden;
      height:230px; background:#e0d4cc; position:relative;
    }
    .venue-map-wrap iframe { width:100%; height:100%; border:0; }
    .venue-map-pin {
      position:absolute; right:14px; top:50%; transform:translateY(-50%);
      width:39px; height:39px; animation:pulse 2s infinite;
    }
    .venue-map-pin img { width:100%; height:100%; }

    /* ══════════════════════════════════════
       SECTION 6 – RSVP (w-7mhdm53u)
    ══════════════════════════════════════ */
    #sec-rsvp { background:var(--primary); padding:30px 20px; }
    .rsvp-title {
      font-family:'Cormorant Garamond',serif; font-size:25px;
      color:#fff; text-align:center; line-height:1;
      margin-bottom:20px;
      animation:zoomIn 3s ease forwards;
    }
    .rsvp-form-inner { display:flex; flex-direction:column; gap:10px; margin:0 38px; }
    .rsvp-input {
      width:100%; padding:11px 10px; background:#fff; color:rgba(0,0,0,.4);
      border:2px double rgba(57,71,58,1); font-size:14px;
      font-family:'Barlow',sans-serif; outline:none; border-radius:0;
    }
    .rsvp-input::placeholder { color:rgba(0,0,0,.4); }
    .rsvp-select-wrap { position:relative; }
    .rsvp-select-wrap::after {
      content:'▾'; position:absolute; right:12px; top:50%;
      transform:translateY(-50%); color:rgba(0,0,0,.4); pointer-events:none;
    }
    .rsvp-select {
      width:100%; padding:11px 10px; background:#fff; color:rgba(0,0,0,.4);
      border:2px double rgba(57,71,58,1); font-size:14px;
      font-family:'Barlow',sans-serif; appearance:none; outline:none; border-radius:0;
    }
    .rsvp-btn {
      width:100%; padding:13px; background:#fff; color:var(--text);
      font-size:16px; font-weight:bold; font-family:'Barlow',sans-serif;
      border:none; cursor:pointer; border-radius:0;
      box-shadow:0 4px 4px rgba(0,0,0,.39);
      transition:transform .15s ease;
    }
    .rsvp-btn:hover { transform:translateY(-2px); }
    .rsvp-gift-btn {
      display:block; width:214px; margin:20px auto 0;
      background:#fff; color:var(--text);
      font-size:16px; font-weight:bold; font-family:'Barlow',sans-serif;
      text-align:center; padding:10px 0; border-radius:9px; cursor:pointer;
      box-shadow:0 4px 4px rgba(0,0,0,.25); border:none;
      transition:transform .15s;
    }
    .rsvp-gift-btn:hover { transform:scale(1.03); }

    /* ══════════════════════════════════════
       SECTION 7 – GALLERY
    ══════════════════════════════════════ */
    #sec-gallery { background:#fff; padding:8px 0 0; }
    .gallery-title {
      font-family:'Great Vibes',cursive; font-size:32px;
      color:var(--text); text-align:left; padding:1.5px 0 0 0;
      display:block; width:193px;
      animation:zoomIn 3s ease forwards;
    }
    .gallery-grid { display:grid; grid-template-columns:1fr 1fr; gap:3px; }
    .gallery-item { overflow:hidden; aspect-ratio:3/4; background:#e0d4cc; }
    .gallery-item.landscape { aspect-ratio:4/3; }
    .gallery-item img { width:100%; height:100%; object-fit:cover; transition:transform .4s ease; }
    .gallery-item img:hover { transform:scale(1.04); }

    /* ══════════════════════════════════════
       SECTION 8 – THANKS (w-srzmee0t)
    ══════════════════════════════════════ */
    #sec-thanks {
      position:relative; height:754px; overflow:hidden; background:#fff;
    }
    #thanks-bg {
      position:absolute; top:0; left:15px;
      width:386px; height:581px;
      background:center center/cover no-repeat;
    }
    .thanks-fade {
      position:absolute; top:420px; left:-9px;
      width:422px; height:162px;
      background:linear-gradient(to top, #fff 0%, rgba(232,249,255,0) 100%);
    }
    .thanks-content {
      position:absolute; bottom:100px; left:0; right:0; text-align:center;
    }
    .thanks-sub {
      font-family:'Cormorant Garamond',serif; font-size:25px;
      color:var(--text); letter-spacing:1px; margin-bottom:4px;
      animation:fadeInDown 3s ease forwards;
    }
    .thanks-main {
      font-family:'Great Vibes',cursive; font-size:40px;
      color:var(--text); line-height:3;
      animation:fadeInUp 3s ease forwards;
    }

    /* ══════════════════════════════════════
       FOOTER
    ══════════════════════════════════════ */
    #sec-footer {
      background:#fff; padding:12px 16px; text-align:right;
      font-size:15px; color:rgba(44,24,16,.7); letter-spacing:1px;
      border-top:1px solid rgba(0,0,0,1);
    }
    #sec-footer .footer-inner { display:flex; justify-content:flex-end; align-items:center; gap:8px; }

    /* ══════════════════════════════════════
       POPUP QR (w-g81yux0n)
    ══════════════════════════════════════ */
    .popup-backdrop {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,.55); z-index:10000;
      align-items:center; justify-content:center;
    }
    .popup-backdrop.open { display:flex; }
    .popup-box {
      background:#fff; border-radius:20px;
      width:400px; max-width:92vw;
      height:381px; max-height:90vh;
      overflow-y:auto; position:relative;

<script>
/* ══ POPULATE DOM ══ */
(function(){
  const g  = CFG.groom        || {};
  const b  = CFG.bride        || {};

  const bf = CFG.brideFamily  || {};
  const ce = CFG.ceremony     || {};
  const re = CFG.reception    || {};
  const im = CFG.img          || {};
  const bk = CFG.bank         || {};
  const mu = CFG.music        || {};

  document.title = `Thiệp Cưới – ${g.firstName||''} & ${b.firstName||''}`;

  // Hero
  bg('hero-bg',        im.heroBg);
  bg('hero-overlay-r', im.overlayRight);
  bg('hero-overlay-l', im.overlayLeft);
  txt('hero-couple',   `${g.firstName||''} & ${b.firstName||''}`);
  txt('hero-date',     ce.date ? ce.date.replace(/\./g,'/') : '');
  src('hero-flower-img', im.flowerIcon);

  // Family
  bg('family-bg', im.familyBg);
  src('venue-icon-img2', im.locationIcon);
  src('note-icon-img',   im.noteIcon);

  // Family cols
  txt('groom-fam-label',  gf.label||'');
  txt('bride-fam-label',  bf.label||'');
  pre('groom-parents', gf.parents||'');
  pre('bride-parents', bf.parents||'');
  txt('groom-address', gf.address||'');
  txt('bride-address', bf.address||'');

  // Announce
  txt('announce-sub-text', 'Trân Trọng Báo Tin Lễ Thành Hôn Của');
  txt('groom-name', g.fullName||g.firstName||'');
  txt('bride-name', b.fullName||b.firstName||'');

  // Guest from URL
  const guestVal = new URLSearchParams(location.search).get(CFG.guestParam||'guest');
  if(guestVal) txt('guest-name-display', decodeURIComponent(guestVal));

  // Ceremony
  txt('ceremony-title', ce.title||'');
  txt('ceremony-time',  ce.time||'');
  txt('ceremony-date',  ce.date||'');
  txt('ceremony-lunar', ce.lunarDate||'');
  txt('ceremony-venue', ce.venue||'');

  // Reception
  txt('reception-title', re.title||'');
  txt('reception-time',  re.time||'');
  txt('reception-date',  re.date||'');
  txt('reception-lunar', re.lunarDate||'');
  txt('reception-venue', re.venue||'');

  // Map ornament
  src('map-ornament-img', im.mapOrnament);
  src('map-pin-img',      im.mapPin);

  // Venue
  src('venue-icon-img',  im.locationIcon);
  src('venue-pin-img2',  im.mapPin);
  txt('venue-name-text',    re.venueName||'');
  txt('venue-address-text', re.venueAddress||'');
  const mapsLink = document.getElementById('venue-maps-link');
  if(mapsLink && re.mapsUrl) mapsLink.href = re.mapsUrl;
  const iframe = document.getElementById('venue-maps-embed');
  if(iframe && re.mapsEmbed) iframe.src = re.mapsEmbed;

  // Music
  const audio = document.getElementById('bg-music');
  if(audio && mu.url){ audio.src = mu.url; audio.volume = mu.volume||.6; }
  src('play-icon',  im.playIcon);
  src('pause-icon', im.pauseGif);

  // QR popup
  src('popup-qr-img', im.qrCode);
  const bankEl = document.getElementById('popup-bank-info');
  if(bankEl) bankEl.innerHTML = `${bk.bankName||''} - ${bk.accountName||''}<br>${bk.accountNo||''}`;

  // Gallery - layout giống code 2: cặp đôi ảnh portrait, rồi landscape, xen kẽ
  const grid = document.getElementById('gallery-grid');
  if(grid && im.gallery){
    im.gallery.forEach((url,i)=>{
      const d = document.createElement('div');
      d.className = 'gallery-item reveal' + (i===2||i===3||i===6||i===7?' landscape':'');
      d.style.transitionDelay = (i*.08)+'s';
      const img = document.createElement('img');
      img.src = url; img.alt=`Ảnh ${i+1}`; img.loading='lazy';
      d.appendChild(img); grid.appendChild(d);
    });
  }

  // Thanks
  bg('thanks-bg', im.thanksBg || im.heroBg);

  // Footer
  txt('footer-names', `| THIỆP CƯỚI ONLINE`);
})();

function txt(id,v){ const e=document.getElementById(id); if(e) e.textContent=v; }
function pre(id,v){ const e=document.getElementById(id); if(e){e.textContent=v; e.style.whiteSpace='pre-line';} }
function src(id,v){ const e=document.getElementById(id); if(e&&v) e.src=v; }
function bg(id,v) { const e=document.getElementById(id); if(e&&v) e.style.backgroundImage=`url('${v}')`; }

/* ══ PETALS ══ */
(function(){
  const cont = document.getElementById('petals-container');
  const syms = ['✿','❀','✾','❁','✽'];
  for(let i=0;i<18;i++){
    const el = document.createElement('span');
    el.className = 'petal';
    el.textContent = syms[i%syms.length];
    el.style.cssText = [
      `left:${Math.random()*100}vw`,
      `font-size:${10+Math.random()*12}px`,
      `animation-duration:${8+Math.random()*12}s`,
      `animation-delay:${Math.random()*16}s`,
      `color:${Math.random()>.5?'#C5A55A':'#7D1F2A'}`,
    ].join(';');
    cont.appendChild(el);
  }
})();

/* ══ MUSIC ══ */
(function(){
  const audio    = document.getElementById('bg-music');
  const toggle   = document.getElementById('music-toggle');
  const playIco  = document.getElementById('play-icon');
  const pauseIco = document.getElementById('pause-icon');
  let started = false;
  function setUI(p){
    playIco.style.display  = p?'none':'block';
    pauseIco.style.display = p?'block':'none';
    toggle.classList.toggle('playing', p);
  }
  const startOnce = ()=>{
    if(!started){
      audio.play().then(()=>{started=true;setUI(true);}).catch(()=>{});
    }
  };
  document.body.addEventListener('click',startOnce,{once:true});
  document.body.addEventListener('touchstart',startOnce,{once:true,passive:true});
  toggle.addEventListener('click',e=>{
    e.stopPropagation();
    if(!audio.paused){audio.pause();setUI(false);}
    else{audio.play().then(()=>{started=true;setUI(true);}).catch(()=>{});}
  });
  audio.addEventListener('play', ()=>setUI(true));
  audio.addEventListener('pause',()=>setUI(false));
})();

/* ══ SCROLL REVEAL ══ */
(function(){
  const els = document.querySelectorAll('.reveal,.reveal-left,.reveal-right,.reveal-zoom');
  const io  = new IntersectionObserver(entries=>{
    entries.forEach(e=>{ if(e.isIntersecting){e.target.classList.add('visible');io.unobserve(e.target);} });
  },{threshold:.12});
  els.forEach(el=>io.observe(el));
})();

/* ══ POPUP ══ */
function openPopup(id){ document.getElementById(id).classList.add('open'); }
function closePopup(id){ document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.popup-backdrop').forEach(bd=>{
  bd.addEventListener('click',e=>{ if(e.target===bd) bd.classList.remove('open'); });
});

/* ══ RSVP ══ */
function submitRSVP(){
  const name   = document.getElementById('rsvp-name').value.trim();
  const rel    = document.getElementById('rsvp-rel').value.trim();
  const wish   = document.getElementById('rsvp-wish').value.trim();
  const attend = document.getElementById('rsvp-attend').value;
  if(!name)   return showToast('Vui lòng nhập tên của bạn');
  if(!attend) return showToast('Vui lòng chọn tình trạng tham dự');
  if(CFG.rsvpUrl){
    fetch(CFG.rsvpUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,rel,wish,attend})})
      .catch(()=>{}).finally(()=>{ showToast('Đã gửi thành công! 🎉'); clearForm(); });
  } else {
    showToast('Đã gửi thành công! 🎉'); clearForm();
  }
}
function clearForm(){
  ['rsvp-name','rsvp-rel','rsvp-wish'].forEach(id=>{document.getElementById(id).value='';});
  document.getElementById('rsvp-attend').value='';
}

/* ══ TOAST ══ */
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='show';
  clearTimeout(t._t);
  t._t=setTimeout(()=>{t.className='hide'; setTimeout(()=>{t.className='';},400);},2800);
}
</script>
